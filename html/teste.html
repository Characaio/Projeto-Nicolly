<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automatic Image Carousel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Carousel container */
    .carousel {
      position: relative;
      width: 600px;
      height: 350px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Images wrapper */
    .carousel-images {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }

    /* Each image */
    .carousel-images img {
      width: 600px;
      height: 350px;
      object-fit: cover;
    }

    /* Navigation dots */
    .dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s;
    }

    .dot.active {
      background: #fff;
    }
  </style>
</head>
<body>

<div class="carousel">
  <div class="carousel-images">
    <img src="https://picsum.photos/id/1015/600/350" alt="Image 1">
    <img src="https://picsum.photos/id/1016/600/350" alt="Image 2">
    <img src="https://picsum.photos/id/1018/600/350" alt="Image 3">
  </div>
  <div class="dots"></div>
</div>

<script>
  const imagesContainer = document.querySelector('.carousel-images');
  const images = document.querySelectorAll('.carousel-images img');
  const dotsContainer = document.querySelector('.dots');

  let index = 0;
  const total = images.length;

  // Create navigation dots
  images.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => {
      index = i;
      updateCarousel();
    });
    dotsContainer.appendChild(dot);
  });

  const dots = document.querySelectorAll('.dot');

  function updateCarousel() {
    imagesContainer.style.transform = `translateX(${-index * 600}px)`;
    dots.forEach(dot => dot.classList.remove('active'));
    dots[index].classList.add('active');
  }

  function autoSlide() {
    index = (index + 1) % total;
    updateCarousel();
  }

  // Auto change every 3 seconds
  setInterval(autoSlide, 3000);
</script>

</body>
</html>
